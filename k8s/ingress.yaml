apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lingwhaat
  namespace: lingwhaat
spec:
  rules:
    - host: lingwhaat.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    - host: www.lingwhaat.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
# HTTPS passthrough — Apache handles SSL termination
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: lingwhaat-https
  namespace: lingwhaat
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`lingwhaat.com`)
      services:
        - name: web
          port: 443
    - match: HostSNI(`www.lingwhaat.com`)
      services:
        - name: web
          port: 443
  tls:
    passthrough: true
