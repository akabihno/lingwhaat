apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: lingwhaat
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: lingwhaat
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Lingwhaat'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: lingwhaat
data:
  canonical_patterns.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "templating": {
        "list": [
          {
            "name": "language",
            "label": "Language",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": {"query": "label_values(lingwhaat_canonical_pattern_overlap_wikipedia_count, language)", "refId": "PrometheusVariableQueryEditor-VariableQuery"},
            "refresh": 2,
            "sort": 1
          },
          {
            "name": "source_id",
            "label": "Manuscript source",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": {"query": "label_values(lingwhaat_canonical_pattern_overlap_manuscript_count{language=\"$language\"}, source_id)", "refId": "PrometheusVariableQueryEditor-VariableQuery"},
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "multi": true,
            "current": {"selected": true, "text": "All", "value": "$__all"}
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Shared top-N patterns: language=$language vs manuscript source",
          "description": "Number of canonical patterns each manuscript source's top-N has in common with language=$language's top-N. Higher = stronger similarity.",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "count by (source_id) (lingwhaat_canonical_pattern_overlap_manuscript_count{language=\"$language\", source_id=~\"$source_id\"})",
              "legendFormat": "source {{source_id}}",
              "refId": "A",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "value",
            "graphMode": "none",
            "orientation": "auto",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "red", "value": null},
                {"color": "orange", "value": 1},
                {"color": "yellow", "value": 5},
                {"color": "green", "value": 15}
              ]},
              "unit": "none"
            },
            "overrides": []
          }
        },
        {
          "type": "table",
          "title": "Shared patterns (language=$language ∩ source_id=$source_id)",
          "description": "Patterns appearing in both top-N sets. wiki_count = occurrences in Wikipedia. manuscript_count = occurrences in manuscript_pattern_match.source_data.",
          "gridPos": {"h": 14, "w": 24, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "Wiki",
              "format": "table",
              "instant": true,
              "expr": "lingwhaat_canonical_pattern_overlap_wikipedia_count{language=\"$language\", source_id=~\"$source_id\"}"
            },
            {
              "refId": "Manuscript",
              "format": "table",
              "instant": true,
              "expr": "lingwhaat_canonical_pattern_overlap_manuscript_count{language=\"$language\", source_id=~\"$source_id\"}"
            }
          ],
          "transformations": [
            {"id": "filterFieldsByName", "options": {"include": {"names": ["pattern", "language", "source_id", "Value #Wiki", "Value #Manuscript"]}}},
            {"id": "organize", "options": {
              "renameByName": {
                "Value #Wiki": "wiki_count",
                "Value #Manuscript": "manuscript_count"
              }
            }}
          ]
        },
        {
          "type": "barchart",
          "title": "Manuscript counts of shared patterns ($language ∩ source_id)",
          "description": "Bar height = how often each shared canonical pattern appears in the manuscript source. Long bars = patterns shared with $language that are very frequent in the manuscript.",
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 22},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "lingwhaat_canonical_pattern_overlap_manuscript_count{language=\"$language\", source_id=~\"$source_id\"}",
              "legendFormat": "src={{source_id}} {{pattern}}",
              "refId": "A",
              "format": "table",
              "instant": true
            }
          ],
          "options": {
            "orientation": "vertical",
            "xField": "pattern",
            "legend": {"showLegend": true, "displayMode": "list", "placement": "bottom"}
          },
          "fieldConfig": {
            "defaults": {"custom": {"axisLabel": "manuscript count"}},
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["lingwhaat", "canonical-pattern", "overlap"],
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Canonical Pattern Overlap",
      "uid": "canonical-patterns",
      "version": 1,
      "weekStart": ""
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: lingwhaat
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      nodeSelector:
        kubernetes.io/hostname: ubuntu-desktop
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_HTTP_PORT
              value: "3000"
          volumeMounts:
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: provisioning-datasources
          configMap:
            name: grafana-provisioning
            items:
              - key: datasource.yaml
                path: datasource.yaml
        - name: provisioning-dashboards
          configMap:
            name: grafana-provisioning
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: lingwhaat
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
  type: NodePort
