# Wrapper script that runs N copies of `messenger:consume` inside one pod.
# - Forwards SIGTERM so workers shut down between messages (no mid-handler KILL).
# - Exits non-zero if any child worker dies, so kubelet restarts the whole pod
#   instead of leaving it half-staffed and invisible to k8s health checks.
# - All knobs come from env so the same script serves every transport.
apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-wrapper
  namespace: lingwhaat
data:
  wrapper.sh: |
    #!/bin/bash
    set -u

    TRANSPORT="${MESSENGER_TRANSPORT_NAME:?MESSENGER_TRANSPORT_NAME is required}"
    CONCURRENCY="${WORKER_CONCURRENCY:-2}"
    MEMORY_LIMIT="${WORKER_MEMORY_LIMIT:-400M}"
    SLEEP="${WORKER_SLEEP:-0.2}"

    declare -a PIDS=()

    shutdown() {
      echo "[wrapper] SIGTERM received; forwarding to ${#PIDS[@]} workers"
      kill -TERM "${PIDS[@]}" 2>/dev/null || true
      wait || true
      exit 0
    }
    trap shutdown TERM INT

    for i in $(seq 1 "$CONCURRENCY"); do
      echo "[wrapper] starting worker $i/$CONCURRENCY for transport=$TRANSPORT"
      php /var/www/html/bin/console messenger:consume "$TRANSPORT" \
        --keepalive --memory-limit="$MEMORY_LIMIT" --sleep="$SLEEP" -vv &
      PIDS+=($!)
    done

    # Wait for the first child to exit. If anyone dies for any reason we tear the
    # pod down so k8s restarts it; otherwise a single-worker pod silently degrades.
    wait -n "${PIDS[@]}" || true
    echo "[wrapper] a worker exited unexpectedly; terminating siblings"
    kill -TERM "${PIDS[@]}" 2>/dev/null || true
    wait || true
    exit 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: lingwhaat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      nodeSelector:
        kubernetes.io/hostname: raspberrypi
      containers:
        - name: scheduler
          image: registry.local:30500/lingwhaat-php:latest
          command: ["php", "/var/www/html/bin/console", "messenger:consume", "scheduler_default", "--keepalive", "--memory-limit=200M", "-vv"]
          envFrom:
            - configMapRef:
                name: lingwhaat-config
            - secretRef:
                name: lingwhaat-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messenger
  namespace: lingwhaat
spec:
  replicas: 4
  selector:
    matchLabels:
      app: messenger
  template:
    metadata:
      labels:
        app: messenger
    spec:
      nodeSelector:
        kubernetes.io/hostname: raspberrypi
      containers:
        - name: messenger
          image: registry.local:30500/lingwhaat-php:latest
          command: ["/bin/bash", "/wrapper/wrapper.sh"]
          env:
            - name: MESSENGER_TRANSPORT_NAME
              value: async
            - name: WORKER_CONCURRENCY
              value: "2"
            - name: WORKER_MEMORY_LIMIT
              value: 400M
            - name: WORKER_SLEEP
              value: "0.2"
          envFrom:
            - configMapRef:
                name: lingwhaat-config
            - secretRef:
                name: lingwhaat-secrets
          volumeMounts:
            - name: wrapper
              mountPath: /wrapper
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: wrapper
          configMap:
            name: worker-wrapper
            defaultMode: 0555
---
