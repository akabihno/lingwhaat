apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: lingwhaat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: registry.local:30500/lingwhaat-php:latest
          command: ["php", "/var/www/html/bin/console", "messenger:consume", "scheduler_default", "--keepalive", "-vv"]
          envFrom:
            - configMapRef:
                name: lingwhaat-config
            - secretRef:
                name: lingwhaat-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
