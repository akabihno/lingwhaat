    spec:
      containers:
        - name: messenger
          image: registry.local:30500/lingwhaat-php:latest
          command: ["php", "/var/www/html/bin/console", "messenger:consume", "async", "--keepalive", "-vv"]
          envFrom:
            - configMapRef:
                name: lingwhaat-config
            - secretRef:
                name: lingwhaat-secrets
          resources:
