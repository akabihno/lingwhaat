framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            wiktionary_async:
                dsn: '%env(MESSENGER_WIKTIONARY_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            wikipedia_async:
                dsn: '%env(MESSENGER_WIKIPEDIA_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            wikipedia_pattern_index_async:
                dsn: '%env(MESSENGER_WIKIPEDIA_PATTERN_INDEX_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            selection_async:
                dsn: '%env(MESSENGER_SELECTION_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            manuscript_language_score_async:
                dsn: '%env(MESSENGER_MANUSCRIPT_LANGUAGE_SCORE_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 1
                    delay: 1000
                    multiplier: 2

            manuscript_language_atbash_score_async:
                dsn: '%env(MESSENGER_MANUSCRIPT_LANGUAGE_ATBASH_SCORE_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 1
                    delay: 1000
                    multiplier: 2

            words_popularity_async:
                dsn: '%env(MESSENGER_WORDS_POPULARITY_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            failed:
                dsn: '%env(MESSENGER_FAILED_DSN)%'
                options:
                    auto_setup: true

        routing:
            'App\Message\ParseWiktionaryArticlesMessage': wiktionary_async
            'App\Message\ParseWiktionaryLanguagesMessage': wiktionary_async
            'App\Message\ParseWikipediaArticlesMessage': wikipedia_async
            'App\Message\ParseWikipediaLanguagesMessage': wikipedia_async
            'App\Message\WikipediaPatternIndexDispatchMessage': wikipedia_pattern_index_async
            'App\Message\WikipediaPatternIndexLanguageMessage': wikipedia_pattern_index_async
            'App\Message\WordsPopularityScoreSetDispatchMessage': words_popularity_async
            'App\Message\WordsPopularityScoreSetMessage': words_popularity_async
            'App\Message\ManuscriptPatternMatchSearchMessage': async
            'App\Message\ManuscriptLanguageScoreDispatchMessage': manuscript_language_score_async
            'App\Message\ManuscriptLanguageScoreMessage': manuscript_language_score_async
            'App\Message\ManuscriptLanguageAtbashScoreDispatchMessage': manuscript_language_atbash_score_async
            'App\Message\ManuscriptLanguageAtbashScoreMessage': manuscript_language_atbash_score_async
            'App\Message\ManuscriptAlphabetDecodeDispatchMessage': async
            'App\Message\ManuscriptAlphabetDecodeMessage': async
            'App\Message\ManuscriptAlphabetDecodeSelectionDispatchMessage': selection_async
            'App\Message\ManuscriptAlphabetDecodeSelectionMessage': selection_async