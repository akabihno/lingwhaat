framework:
    messenger:
        failure_transport: failed

        transports:
            # Using Redis for async transport
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 0

            # Dedicated transport for getting wikipedia articles
            wikipedia_async:
                dsn: '%env(MESSENGER_WIKIPEDIA_TRANSPORT_DSN)%'
                options:
                    queue_name: wikipedia_async
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 0

            failed:
                dsn: '%env(MESSENGER_FAILED_DSN)%'

        routing:
            'App\Message\ParseWiktionaryArticlesMessage': async
            'App\Message\ParseWikipediaArticlesMessage': wikipedia_async
            'App\Message\WordsPopularityScoreSetMessage': async
