framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            wiktionary_async:
                dsn: '%env(MESSENGER_WIKTIONARY_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            wikipedia_async:
                dsn: '%env(MESSENGER_WIKIPEDIA_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            failed:
                dsn: '%env(MESSENGER_FAILED_DSN)%'
                options:
                    auto_setup: true

        routing:
            'App\Message\ParseWiktionaryArticlesMessage': wiktionary_async
            'App\Message\ParseWiktionaryLanguagesMessage': wiktionary_async
            'App\Message\ParseWikipediaArticlesMessage': wikipedia_async
            'App\Message\ParseWikipediaLanguagesMessage': wikipedia_async
            'App\Message\WordsPopularityScoreSetDispatchMessage': async
            'App\Message\WordsPopularityScoreSetMessage': async
            'App\Message\WikipediaPatternIndexDispatchMessage': wikipedia_async
            'App\Message\ManuscriptPatternMatchSearchMessage': async