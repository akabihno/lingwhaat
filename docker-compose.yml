      - MESSENGER_WIKTIONARY_TRANSPORT_DSN=${MESSENGER_WIKTIONARY_TRANSPORT_DSN}
      - MESSENGER_FAILED_DSN=${MESSENGER_FAILED_DSN}
    network_mode: host
